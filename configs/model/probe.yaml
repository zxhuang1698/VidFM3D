_target_: vidfm3d.models.video_probe_module.VideoProbeLitModule

resume_from_checkpoint: ${ckpt_path}
output_path: ${paths.output_dir}

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 1e-4
  betas:
    - 0.9
    - 0.95
  weight_decay: 0.05

scheduler:
  _target_: pl_bolts.optimizers.lr_scheduler.LinearWarmupCosineAnnealingLR
  _partial_: true
  warmup_epochs: 10
  max_epochs: ${trainer.max_epochs}
  eta_min: 1e-06

probe:
  _target_: vidfm3d.models.components.probe_pixalign.ProbeModelPA
  embed_dim: 1024
  video_channels: 1536
  backbone_depth: 4
  dpt_dim: 256
  dpt_stage_channels: [256, 512, 1024, 1024]
  dpt_intermediate_layer_idx: [0, 1, 2, 3]
  gradient_checkpointing: true
  active_heads: ["depth", "point", "camera"]

# Loss weights
loss_weights:
  pmap: 1.0
  dmap: 1.0
  pmap_grad: 0.0
  dmap_grad: 0.0
  camera: 1.0

# compile model for faster training with pytorch 2.0
compile: false
